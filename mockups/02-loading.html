<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mockup 2 — Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
  .loading-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  .spinner {
    width: 56px;
    height: 56px;
    border: 4px solid var(--black3);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 32px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-message {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--off-white);
    max-width: 320px;
    line-height: 1.5;
    min-height: 42px;
    animation: fade 1.5s ease-in-out infinite;
  }
  @keyframes fade {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .loading-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .msg-cycle {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--black3);
    border-top: 1px solid var(--black3);
    padding-top: 20px;
  }
  .msg-cycle .label { color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="screen">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-message">samay teri zindagi judge kar raha hai...</div>
    <div class="loading-sub">~ generating roast ~</div>

    <!-- mockup-only: list of all rotation messages so we can review -->
    <div class="msg-cycle">
      <div class="label">cycles every 1.5s — order:</div>
      <div>1. samay teri zindagi judge kar raha hai...</div>
      <div>2. gym membership ka record check ho raha hai...</div>
      <div>3. sleep schedule dekh ke rona aa gaya...</div>
      <div>4. roast likh raha hai, ruk yaar...</div>
    </div>
  </div>
</div>
</body>
</html>
